<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tarkov night Timer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Tarkov night Timer</h1>

<div class="card">

<div class="row">
<span>システム時間</span>
<span id="realClock"></span>
</div>

<div class="row">
<span>Raid #1</span>
<span id="dayClock"></span>
</div>

<div class="row">
<span>Raid #2</span>
<span id="nightClock"></span>
</div>

</div>

<div class="card highlight">

<div class="title">22:00まで残り時間</div>

<div id="wait" class="countdown"></div>
<div id="waitReal" class="realTime"></div>

</div>

<div id="nightCard" class="card nightCard">

<div id="nightNotice" class="nightNotice"></div>

<div id="nightTimer" class="countdown"></div>

<div id="nightReal" class="realTime"></div>

</div>

Terminal timeは 22:00-04:00 です。<br>
システム時刻によってはゲームと時間がずれる場合があります。<br>
Depending on the system time, the time may differ from the actual time in the game.

</div>

<script src="timer.js"></script>

</body>
</html>
